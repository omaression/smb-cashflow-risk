services:
  db:
    image: postgres:16-alpine
    container_name: smb-cashflow-risk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smb_cashflow_risk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smb_cashflow_risk"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    container_name: smb-cashflow-risk-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/smb_cashflow_risk
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://api:8000/api/v1
    container_name: smb-cashflow-risk-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
